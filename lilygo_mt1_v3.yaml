esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2026.3.2
  name_add_mac_suffix: false

  # Logic to initialize SOC and Capacity on boot based on voltage if no value is restored
  on_boot:
    priority: -10
    then:
      - wait_until:
          lambda: |-
            return !isnan(id(min_cell_voltage).state) && !isnan(id(battery_power).state);
      - lambda: |-
          if (id(calc_soc_wh) == 0 || isnan(id(calc_soc_wh))) {
            float v = id(min_cell_voltage).state;
            float p = id(battery_power).state;
            
            // --- VOLTAGE SAG COMPENSATION ---
            // If discharging (power is negative), the voltage is artificially low.
            // We add a small offset (e.g., 0.05V to 0.1V) based on load to estimate resting voltage.
            v += p/-25000.0f; // Simple linear compensation based on power (tune as needed)

            float start_soc_pct = 0.0f;
            if (v >= 3.47) start_soc_pct = 1.00;
            else if (v >= 3.35) start_soc_pct = 0.90 + (v - 3.35) * (0.10 / 0.12);
            else if (v >= 3.25) start_soc_pct = 0.01 + (v - 3.25) * (0.89 / 0.1);
            else start_soc_pct = 0.0;
            
            id(calc_soc_wh) = start_soc_pct * id(learned_usable_wh);
            ESP_LOGI("SOC_INIT", "Measured: %.3fV, Power: %.0fW -> Compensated V: %.3fV -> SOC: %.1f Wh", 
                     id(min_cell_voltage).state, p, v, id(calc_soc_wh));
          }

esp32:
  board: esp32dev
  cpu_frequency: 80MHz
  flash_size: 4MB
  framework:
    type: esp-idf

# Persistent storage for Coulomb Counting and Learning
globals:
  - id: calc_soc_wh
    type: float
    restore_value: yes
    initial_value: '0'
  - id: learned_usable_wh
    type: float
    restore_value: yes
    initial_value: ${default_usable_wh}
  - id: cycle_energy_accumulator
    type: float
    restore_value: no
    initial_value: '0'
  - id: is_learning_cycle
    type: bool
    restore_value: no
    initial_value: 'false'
# 1. cuttof globals
  - id: hv_cutoff_v
    type: float
    restore_value: yes
    initial_value: '3.50'
  - id: hv_warning_v
    type: float
    restore_value: yes
    initial_value: '3.40'
  - id: lv_cutoff_v
    type: float
    restore_value: yes
    initial_value: '3.21'
  - id: reset_v
    type: float
    restore_value: yes
    initial_value: '3.35'
  - id: led_brightness
    type: float
    restore_value: no
    initial_value: '0.3' # 0.3 is 30%
  - id: bypass_interval_days
    type: int
    restore_value: yes
    initial_value: '10'  # Default to every 10 days
  - id: days_since_last_bypass
    type: int
    restore_value: yes
    initial_value: '0'
  - id: last_day_check_timestamp
    type: int
    restore_value: yes
    initial_value: '0'

# Variables to remember your "Normal" power settings
  - id: normal_charge_power
    type: float
    restore_value: yes
    initial_value: '2000' # Change this to your preferred default
  - id: normal_discharge_power
    type: float
    restore_value: yes
    initial_value: '2000' # Change this to your preferred default

logger:
  level: ERROR  # Set global level to VERBOSE to allow sub-components to show detail
  logs:
    component: ERROR
# Enable Home Assistant API
api:
  reboot_timeout: 0s
#  encryption:
#    key: "YourKeyHere"

## Enable OTA updates
ota:
  - platform: esphome
    password: !secret ota_password
  - platform: web_server

wifi:
  ssid: !secret wifi_ssid_liv
  password: !secret wifi_password
  domain: .lan
  reboot_timeout: 30s
  fast_connect: true
  power_save_mode: none
  min_auth_mode: wpa2
  output_power: 8.5dB


## uncomment if you need a fixed ip address
#  manual_ip:
#    static_ip: 192.168.178.126
#    gateway: 192.168.178.1
#    subnet: 255.255.255.0

## Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "${friendly_name} Hotspot"
    password: "configesp"
    ap_timeout: 45s

captive_portal:
  id: id_captive_portal

web_server:
  port: 80
  version: 3
  include_internal: False
#  ota: False
  local: True
  sorting_groups:
    - id: Info
      name: "Info"
      sorting_weight: -40
    - id: Control
      name: "Control"
      sorting_weight: -30
    - id: Status
      name: "Status"
      sorting_weight: -20
    - id: Diagnostic
      name: "Diagnostic"
      sorting_weight: -10

time:
  - platform: sntp
    id: sntp_time
    on_time:
      # Every day at midnight, increment the counter
      - seconds: 0
        minutes: 0
        hours: 0
        then:
          - lambda: |-
              id(days_since_last_bypass)++;
              ESP_LOGI("BYPASS", "Days since last protection bypass: %d", id(days_since_last_bypass));

# Set pins required for LilyGo T-CAN485 board
output:
  - platform: gpio
    id: ENABLE_PIN # Enable the chip
    pin:
      number: GPIO19
      inverted: true

  - platform: gpio
    id: SE_PIN # Enable autodirection
    pin:
      number: GPIO17
      inverted: true

  - platform: gpio
    id: ENABLE_5V_PIN # Enable 5V pin for RS485 chip
    pin:
      number: GPIO16
      inverted: true

# Configure UART
uart:
  - id: mod_bus
    rx_pin: GPIO21
    tx_pin: GPIO22
    baud_rate: 115200
    data_bits: 8
    stop_bits: 1
    parity: NONE

modbus:
  - uart_id: mod_bus
    id: modbus1
    send_wait_time: 30ms

modbus_controller:
  - id: mt
    address: 0x1
    modbus_id: modbus1
    command_throttle: 30ms
    update_interval: 3s

debug:
  update_interval: 10s

# Uart logging on/off switch
switch:
  - platform: template
    name: UART Logging
    id: uart_debug_switch
    icon: mdi:text
    restore_mode: ALWAYS_OFF
    optimistic: true
    turn_on_action:
      - logger.set_level: VERBOSE
    turn_off_action:
      - logger.set_level: ERROR
    entity_category: diagnostic
    web_server:
      sorting_group_id: Diagnostic
      sorting_weight: 20
  - platform: factory_reset
    name: "Factory Reset Switch"
      
