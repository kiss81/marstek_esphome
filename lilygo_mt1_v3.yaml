###############################################################################
# LED
###############################################################################
light:
  - platform: esp32_rmt_led_strip
    rgb_order: GRB
    chipset: WS2812
    pin: GPIO4
    num_leds: 1
    name: "Status LED"
    id: status_led
    # Sets the default brightness to 10% on startup
    default_transition_length: 0s
    restore_mode: ALWAYS_OFF

interval:
  # --- 1s INTERVAL: COULOMB COUNTING ENGINE & LEARNING LOGIC ---
  - interval: 1s
    then:
      - lambda: |-
          float p = id(battery_power).state;
          float v_min = id(min_cell_voltage).state;
          int msoc = id(battery_state_of_charge).state;
          float v_max = id(max_cell_voltage).state;
          if (isnan(p) || isnan(v_min) || isnan(v_max)) return;

          // Coulomb Count (Wh) calculation: Power * (1 second / 3600 seconds/hour)
          float delta_wh = (p / 3600.0f);
          id(calc_soc_wh) += delta_wh;

          // Trigger Learning Start (Battery is Empty)
          if (v_min <= 3.22f | msoc <= 12) {
            id(calc_soc_wh) = 0.0f;
            id(cycle_energy_accumulator) = 0.0f;
            id(is_learning_cycle) = true;
          }

          // Accumulate energy during charge for Capacity Learning
          if (id(is_learning_cycle) && p > 0) {
            id(cycle_energy_accumulator) += delta_wh;
          }

          // Trigger Learning End (Battery is Full)
          if (v_max >= 3.47f) {
            id(calc_soc_wh) = id(learned_usable_wh);
            if (id(is_learning_cycle) && id(cycle_energy_accumulator) > (id(learned_usable_wh) * 0.5f)) {
              id(learned_usable_wh) = id(cycle_energy_accumulator);
              id(is_learning_cycle) = false;
              ESP_LOGI("CAPACITY", "Learned new capacity: %.1f Wh", id(learned_usable_wh));
            }
          }

          // Bound checking
          if (id(calc_soc_wh) > id(learned_usable_wh)) id(calc_soc_wh) = id(learned_usable_wh);
          if (id(calc_soc_wh) < 0) id(calc_soc_wh) = 0;

  # --- 5s INTERVAL: ORIGINAL LED & STATUS LOGIC ---
  - interval: 5s
    then:
      - lambda: |-
          ESP_LOGD("status", "Modbus: %.0f, WiFi: %.0f", id(modbus_status).state, id(wifi_strength).state);
      - if:
          # --- 🟢 CASE 1: EVERYTHING OK ---
          condition:
            lambda: |-
              return !isnan(id(modbus_status).state) && id(wifi_strength).state > -80;
          then:
            - light.turn_on:
                id: status_led
                brightness: !lambda return id(led_brightness);
                red: 0%
                green: 100%
                blue: 0%
          else:
            - if:
                # --- 🟣 CASE 2: BOTH FAILED ---
                condition:
                  lambda: |-
                    return isnan(id(modbus_status).state) && id(wifi_strength).state < -80;
                then:
                  - light.turn_on:
                      id: status_led
                      brightness: !lambda return id(led_brightness);
                      red: 100%
                      green: 0%
                      blue: 100%
                else:
                  - if:
                      # --- 🔵 CASE 3: ONLY WIFI WEAK ---
                      condition:
                        lambda: |-
                          return id(wifi_strength).state < -80;
                      then:
                        - light.turn_on:
                            id: status_led
                            brightness: !lambda return id(led_brightness);
                            red: 0%
                            green: 0%
                            blue: 100%
                      else:
                        # --- 🔴 CASE 4: ONLY MODBUS ERROR ---
                        - light.turn_on:
                            id: status_led
                            brightness: !lambda return id(led_brightness);
                            red: 100%
                            green: 0%
                            blue: 0%

  # THE AUTOMATION LOGIC for the cuttoffs based on cell voltages.
  - interval: 1s
    then:
      - lambda: |-
          float v_max = id(max_cell_voltage).state;
          float v_min = id(min_cell_voltage).state;
          
          // Determine if we should bypass protections today
          bool is_bypass_day = (id(days_since_last_bypass) >= id(bypass_interval_days));

          if (is_bypass_day) {
            // If we hit the target voltage during a bypass day, 
            // we reset the counter so it doesn't stay in bypass mode forever.
            if (v_max >= id(hv_cutoff_v)) {
               id(days_since_last_bypass) = 0;
               ESP_LOGI("BYPASS", "Bypass target reached. Resetting day counter.");
            }
            return; // Exit the lambda early: skips all cutoff logic below
          }

          // --- CHARGE CONTROL (Only runs if NOT a bypass day) ---
          // --- CHARGE CONTROL (High Voltage) ---
          if (v_max >= id(hv_cutoff_v)) {
            // Step 1: Over 3.50V - Stop Charge
            if (id(max_charge_power).state != 0) {
              auto call = id(max_charge_power).make_call();
              call.set_value(0);
              call.perform();
              ESP_LOGW("PROTECTION", "Max Cell Voltage High (%.3fV). Charging Stopped.", v_max);
            }
          } 
          else if (v_max >= id(hv_warning_v)) {
            // Step 3: Over 3.40V - Limit to 500W
            if (id(max_charge_power).state > 500) {
              auto call = id(max_charge_power).make_call();
              call.set_value(500);
              call.perform();
              ESP_LOGI("PROTECTION", "Max Cell Voltage Warning (%.3fV). Power limited to 500W.", v_max);
            }
          }
          else if (v_max <= id(reset_v)) {
            // Reset to Normal when below 3.35V
            if (id(max_charge_power).state < id(normal_charge_power)) {
              auto call = id(max_charge_power).make_call();
              call.set_value(id(normal_charge_power));
              call.perform();
              ESP_LOGI("PROTECTION", "Cell Voltage Normalized. Charge Power restored.");
            }
          }

          // --- DISCHARGE CONTROL (Low Voltage) ---
          if (v_min <= id(lv_cutoff_v)) {
            // Step 2: Below 3.21V - Stop Discharge
            if (id(max_discharge_power).state != 0) {
              auto call = id(max_discharge_power).make_call();
              call.set_value(0);
              call.perform();
              ESP_LOGW("PROTECTION", "Min Cell Voltage Low (%.3fV). Discharging Stopped.", v_min);
            }
          }
          else if (v_min >= id(reset_v)) {
            // Reset to Normal when above 3.35V
            if (id(max_discharge_power).state < id(normal_discharge_power)) {
              auto call = id(max_discharge_power).make_call();
              call.set_value(id(normal_discharge_power));
              call.perform();
              ESP_LOGI("PROTECTION", "Cell Voltage Normalized. Discharge Power restored.");
            }
          }