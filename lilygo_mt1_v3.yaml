    name: "Force Protection Bypass Now"
    on_press:
      then:
        - lambda: |-
            id(days_since_last_bypass) = id(bypass_interval_days);
            id(days_until_bypass_sensor).update(); // Force UI update immediately
            ESP_LOGI("BYPASS", "Bypass manually triggered.");

###############################################################################
# LED
###############################################################################
light:
  - platform: esp32_rmt_led_strip
    rgb_order: GRB
    chipset: WS2812
    pin: GPIO4
    num_leds: 1
    name: "Status LED"
    id: status_led
    # Sets the default brightness to 10% on startup
    default_transition_length: 0s
    restore_mode: ALWAYS_OFF

interval:
  # --- 1s INTERVAL: COULOMB COUNTING ENGINE & LEARNING LOGIC ---
  - interval: 1s
    then:
      - lambda: |-
          float p = id(battery_power).state;
          float v_min = id(min_cell_voltage).state;
          float v_max = id(max_cell_voltage).state;
          
          if (isnan(p) || isnan(v_min) || isnan(v_max)) return;

          // 1. Basic Coulomb Counting (Energy Delta in Wh)
          float delta_wh = (p / 3600.0f);
          id(calc_soc_wh) += delta_wh;

          // 2. TRIGGER: Learning START (Battery is "Empty" at 3.20V)
          // We trigger slightly above the limit (+0.01) to ensure it fires 
          // before the hard cutoff stops all activity.
          if (v_min <= (id(lv_cutoff_v) + 0.01f)) { 
            if (!id(is_learning_cycle)) {
              id(cycle_energy_accumulator) = 0.0f;
              id(is_learning_cycle) = true;
              ESP_LOGI("LEARNING", "0%% SOC reached (%.2fV). Starting capacity accumulation...", v_min);
            }
            id(calc_soc_wh) = 0.0f; // Sync internal SOC to 0
          }

          // 3. Accumulate Energy (Charge Only)
          if (id(is_learning_cycle)) {
            if (p > 2.0f) { // Only count while actually charging
              id(cycle_energy_accumulator) += delta_wh;
            }
            // Removed strict invalidation. The cycle stays active until 100% is hit.
          }

          // 4. TRIGGER: Learning END (Battery is "Full" at 3.50V)
          if (v_max >= id(hv_cutoff_v)) {
            id(calc_soc_wh) = id(learned_usable_wh); // Sync internal SOC to 100%
            
            if (id(is_learning_cycle)) {
              float new_cap = id(cycle_energy_accumulator);
              float current_cap = id(learned_usable_wh);
              
              // Only process if we accumulated a realistic amount of energy (>500Wh)
              if (new_cap > 500.0f) {
                float deviation = fabsf(new_cap - current_cap) / current_cap;
                
                // Safety Check: Accept if it's the first time (4000) OR within 20% of current
                if (current_cap == 4000.0f || deviation < 0.20f) {
                  id(learned_usable_wh) = new_cap;
                  ESP_LOGI("LEARNING", "SUCCESS! New capacity: %.1f Wh (Dev: %.1f%%)", new_cap, deviation * 100.0);
                } else {
                  ESP_LOGW("LEARNING", "REJECTED: New value %.1f Wh varies too much from %.1f Wh", new_cap, current_cap);
                }
              }
              id(is_learning_cycle) = false; // Reset for next cycle
            }
          }

          // 5. Keep Internal Wh within learned bounds
          if (id(calc_soc_wh) > id(learned_usable_wh)) id(calc_soc_wh) = id(learned_usable_wh);
          if (id(calc_soc_wh) < 0) id(calc_soc_wh) = 0;

  # --- 5s INTERVAL: ORIGINAL LED & STATUS LOGIC ---
  - interval: 5s
    then:
      - lambda: |-
          ESP_LOGD("status", "Modbus: %.0f, WiFi: %.0f", id(modbus_status).state, id(wifi_strength).state);
      - if:
          # --- 🟢 CASE 1: EVERYTHING OK ---
          condition:
            lambda: |-
              return !isnan(id(modbus_status).state) && id(wifi_strength).state > -80;
          then:
            - light.turn_on:
                id: status_led
                brightness: !lambda return id(led_brightness);
                red: 0%
                green: 100%
                blue: 0%
          else:
            - if:
                # --- 🟣 CASE 2: BOTH FAILED ---
                condition:
                  lambda: |-
                    return isnan(id(modbus_status).state) && id(wifi_strength).state < -80;
                then:
                  - light.turn_on:
                      id: status_led
                      brightness: !lambda return id(led_brightness);
                      red: 100%
                      green: 0%
                      blue: 100%
                else:
                  - if:
                      # --- 🔵 CASE 3: ONLY WIFI WEAK ---
                      condition:
                        lambda: |-
                          return id(wifi_strength).state < -80;
                      then:
                        - light.turn_on:
                            id: status_led
                            brightness: !lambda return id(led_brightness);
                            red: 0%
                            green: 0%
                            blue: 100%
                      else:
                        # --- 🔴 CASE 4: ONLY MODBUS ERROR ---
                        - light.turn_on:
                            id: status_led
                            brightness: !lambda return id(led_brightness);
                            red: 100%
                            green: 0%
                            blue: 0%

  # THE AUTOMATION LOGIC for the cuttoffs based on cell voltages.
  - interval: 1s
    then:
      - lambda: |-
          float v_max = id(max_cell_voltage).state;
          float v_min = id(min_cell_voltage).state;
          
          // Safety: Skip cutoff logic if voltages are not yet valid (NaN)
          if (isnan(v_max) || isnan(v_min)) {
            return;
          }
          
          // Calculate current SOC for the reset logic
          float current_soc = (id(calc_soc_wh) / id(learned_usable_wh)) * 100.0f;
          
          bool is_bypass_day = (id(days_since_last_bypass) >= id(bypass_interval_days) || id(days_until_bypass_sensor).state <= 0);

          // --- 1. APPLY CHARGE LIMITS (Warnings) ---
          if (v_max > (id(hv_warning_v) + 0.08)) { // e.g., 3.49V
            if (id(max_charge_power).state > 300) {
              id(max_charge_power).make_call().set_value(300).perform();
            }
          }
          else if (v_max >= id(hv_warning_v)) { // e.g., 3.40V
            if (id(max_charge_power).state > 600) {
              id(max_charge_power).make_call().set_value(600).perform();
            }
          }

          // --- 2. HARD CUTOFFS & BYPASS ---
          if (is_bypass_day) {
            if (v_max >= id(hv_cutoff_v)) {
               id(days_since_last_bypass) = 0;
               ESP_LOGI("BYPASS", "Full charge reached. Bypass cycle complete.");
            }
          } else {
            // Apply 0W Hard Cutoffs only if NOT a bypass day
            if (v_max >= id(hv_cutoff_v)) {
              if (id(max_charge_power).state != 0) {
                id(max_charge_power).make_call().set_value(0).perform();
              }
            }
            if (v_min <= id(lv_cutoff_v)) {
              if (id(max_discharge_power).state != 0) {
                id(max_discharge_power).make_call().set_value(0).perform();
              }
            }
          }

          // --- 3. SOC-BASED NORMALIZATION (RESETS) ---

          // CHARGE RESET: Reset to normal after a 10% discharge from the peak SOC
          if (id(max_charge_power).state < id(normal_charge_power)) {
            // Record/Update the peak SOC reached while charging was limited
            if (current_soc > id(charge_limit_applied_soc)) {
              id(charge_limit_applied_soc) = current_soc;
            }
            // Check if we have discharged enough (e.g., 10%) from that peak
            if (current_soc <= (id(charge_limit_applied_soc) - id(soc_reset_delta_pct))) {
              id(max_charge_power).make_call().set_value(id(normal_charge_power)).perform();
              id(charge_limit_applied_soc) = 0.0f;
              ESP_LOGI("RESET", "Charge power normalized. Dropped 10%% SOC from peak.");
            }
          } else {
            id(charge_limit_applied_soc) = 0.0f;
          }

          // DISCHARGE RESET: Reset to normal after a 10% charge from the trough SOC
          if (id(max_discharge_power).state < id(normal_discharge_power)) {
            // Record/Update the lowest SOC reached while discharging was limited
            if (id(discharge_limit_applied_soc) < 0.0f || current_soc < id(discharge_limit_applied_soc)) {
              id(discharge_limit_applied_soc) = current_soc;
            }
            // Check if we have charged enough (e.g., 10%) from that bottom point
            if (current_soc >= (id(discharge_limit_applied_soc) + id(soc_reset_delta_pct))) {
              id(max_discharge_power).make_call().set_value(id(normal_discharge_power)).perform();
              id(discharge_limit_applied_soc) = -1.0f;
              ESP_LOGI("RESET", "Discharge power normalized. Rose 10%% SOC from bottom.");
            }
          } else {
            id(discharge_limit_applied_soc) = -1.0f;
          }