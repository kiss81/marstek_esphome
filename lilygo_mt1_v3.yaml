      ESP_LOGD("main","Parsed operation mode int : %d", int_mode);
      std::string mode_str;
      switch (int_mode) {
        case 0:  mode_str = "Disconnected"; break;
        case 1:  mode_str = "Connected"; break;                                                              
      }
      return mode_str;
    web_server:
      sorting_group_id: Diagnostic
      sorting_weight: 22

## Sensoren
sensor:
  # --- NEW CALCULATED SENSORS ---
  - platform: template
    name: "Learned Usable Capacity"
    id: learned_capacity_sensor
    unit_of_measurement: "Wh"
    accuracy_decimals: 1
    lambda: return id(learned_usable_wh);
    icon: mdi:database-sync
    entity_category: diagnostic
    web_server:
      sorting_group_id: Info
      sorting_weight: 2

  - platform: template
    name: "Calculated SOC"
    id: custom_calculated_soc
    icon: mdi:battery-check
    unit_of_measurement: "%"
    device_class: battery
    state_class: measurement
    accuracy_decimals: 1
    web_server:
      sorting_group_id: Info
      sorting_weight: 5
    lambda: |-
      return (id(calc_soc_wh) / id(learned_usable_wh)) * 100.0;

  # --- ORIGINAL MODBUS SENSORS ---
  - name: "Battery Wifi Signal Strength"
    id: battery_wifi_signal_strength
    icon: mdi:wifi
    platform: modbus_controller
    modbus_controller_id: mt
    register_type: holding
    address: 30303
    value_type: U_WORD
    unit_of_measurement: "dBm"
    device_class: signal_strength
    state_class: measurement
    filters:
      - multiply: -1
    accuracy_decimals: 0   
    web_server:
      sorting_group_id: Diagnostic
      sorting_weight: 7

  - name: Battery Wifi signal
    id: battery_wifi_signal_proc
    icon: mdi:wifi
    platform: copy # Reports the Battery signal strength in %
    source_id: battery_wifi_signal_strength
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "%"
    entity_category: diagnostic
    device_class: ""
    web_server:
      sorting_group_id: Diagnostic
      sorting_weight: 6

  - id: inverter_state  # No name, since it's internal
    icon: mdi:state-machine
    platform: modbus_controller
    modbus_controller_id: mt
    register_type: holding
    address: 35100
    value_type: U_WORD
    internal: true # Hides from Home Assistant
    web_server:
      sorting_group_id: Info
      sorting_weight: 30

