        sorting_weight: 3

  - platform: version
    name: ESP Version
    hide_timestamp: true
    disabled_by_default: false
    icon: mdi:new-box
    entity_category: diagnostic
    web_server:
      sorting_group_id: Diagnostic
      sorting_weight: 2

  - name: "Wifi status"
    id: wifi_status
    icon: mdi:wifi-alert
    platform: modbus_controller
    modbus_controller_id: mt
    register_type: holding
    address: 30300
    raw_encode: NONE
    entity_category: diagnostic
    skip_updates: 20
    lambda: |-
      uint16_t int_mode = (data[item->offset] << 8) + data[item->offset+1];
      ESP_LOGD("main","Parsed operation mode int : %d", int_mode);
      std::string mode_str;
      switch (int_mode) {
        case 0:  mode_str = "Disconnected"; break;
        case 1:  mode_str = "Connected"; break;                                                              
      }
      return mode_str;
    web_server:
      sorting_group_id: Diagnostic
      sorting_weight: 20

  - name: "BT status"
    id: bt_status
    icon: mdi:home-heart
    platform: modbus_controller
    modbus_controller_id: mt
    register_type: holding
    address: 30301
    raw_encode: NONE
    entity_category: diagnostic
    skip_updates: 20
    lambda: |-
      uint16_t int_mode = (data[item->offset] << 8) + data[item->offset+1];
      ESP_LOGD("main","Parsed operation mode int : %d", int_mode);
      std::string mode_str;
      switch (int_mode) {
        case 0:  mode_str = "Off"; break;
        case 1:  mode_str = "Active after boot"; break;    
        case 2:  mode_str = "Connected"; break; 
        case 3:  mode_str = "Active"; break;                                                           
      }
      return mode_str;
    web_server:
      sorting_group_id: Diagnostic
      sorting_weight: 21

  - name: "Cloud status"
    id: cloud_status
    icon: mdi:home-heart
    platform: modbus_controller
    modbus_controller_id: mt
    register_type: holding
    address: 30302
    raw_encode: NONE
